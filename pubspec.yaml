name: bad_habits_punisher
description: A cross-platform app that detects bad habits using device camera.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Camera
  camera: ^0.11.0+2

  # Database (SQLite)
  drift: ^2.21.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # UI
  fl_chart: ^0.69.0
  google_fonts: ^6.2.1
  percent_indicator: ^4.2.3

  # Utilities
  intl: ^0.19.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  google_mlkit_pose_detection: ^0.14.1
  google_mlkit_face_mesh_detection: ^0.4.2
  hand_landmarker: ^2.2.0

  # ML - MediaPipe wrappers
  # These will be added as we implement each detector
  # mediapipe_face_mesh: ^1.8.0
  # flutter_pose_detection: ^0.4.1

  # Monetization (later)
  # revenuecat: ^1.0.0
  # google_mobile_ads: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Code generation
  build_runner: ^2.4.9
  drift_dev: ^2.21.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
